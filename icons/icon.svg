<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2d4a2d"/>
  <!-- compass rose -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#c4892a" stroke-width="6" opacity="0.4"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="#c4892a" stroke-width="3" opacity="0.25"/>
  <!-- north needle -->
  <path d="M256 136 L270 248 L256 262 L242 248 Z" fill="#c4892a"/>
  <!-- south needle -->
  <path d="M256 376 L242 264 L256 250 L270 264 Z" fill="#f4f1ea" opacity="0.7"/>
  <!-- east/west ticks -->
  <line x1="136" y1="256" x2="160" y2="256" stroke="#c4892a" stroke-width="4" stroke-linecap="round"/>
  <line x1="352" y1="256" x2="376" y2="256" stroke="#c4892a" stroke-width="4" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="256" cy="256" r="10" fill="#c4892a"/>
  <!-- N label -->
  <text x="256" y="122" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="28" font-weight="700" fill="#c4892a">N</text>
</svg>
