<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wanderlust</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2d4a2d">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d4a2d;
    --green-mid: #3a5c3a;
    --green-light: #4a7050;
    --gold: #c4892a;
    --gold-light: #e0a84a;
    --cream: #f4f1ea;
    --text: #1a1a1a;
    --muted: #6b7280;
    --surface: #ffffff;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── iOS device frame ── */
  .device-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 16px;
  }

  .device {
    position: relative;
    width: 393px;
    height: 852px;
    background: var(--surface);
    border-radius: 54px;
    border: 10px solid #1a1a1a;
    box-shadow:
      0 0 0 2px #3a3a3a,
      0 40px 80px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(255,255,255,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    padding: 14px 28px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    background: transparent;
    position: relative;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }

  /* App container */
  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    overflow: hidden;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Scrollable content inside screen */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── HOME SCREEN ── */
  #home { background: var(--green); }

  .home-hero {
    padding: 20px 24px 28px;
    background: linear-gradient(160deg, #2d4a2d 0%, #3a5c3a 100%);
    position: relative;
    overflow: hidden;
  }
  .home-hero .topo {
    position: absolute;
    inset: 0;
    opacity: 0.08;
    pointer-events: none;
  }
  .home-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 4px;
    position: relative;
  }
  .home-hero h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .home-hero p {
    font-size: 13px;
    color: rgba(244,241,234,0.65);
    margin-bottom: 20px;
    position: relative;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(196,137,42,0.35);
    border-radius: 14px;
    padding: 12px 16px;
    gap: 10px;
    position: relative;
    cursor: text;
  }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cream);
    font-size: 16px;
    font-family: inherit;
  }
  .search-bar input::placeholder { color: rgba(244,241,234,0.45); }
  .search-bar .search-icon { color: var(--gold); font-size: 18px; }
  .search-bar .search-btn {
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .search-bar .search-btn:active { opacity: 0.8; }

  .home-body {
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 100px;
    flex: 1;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 16px;
  }

  /* Recents list */
  .recents-list { display: flex; flex-direction: column; gap: 10px; }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: #fff;
    border-radius: 14px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.06);
    transition: transform 0.15s;
  }
  .recent-item:active { transform: scale(0.98); }
  .recent-thumb {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .recent-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .recent-info { flex: 1; }
  .recent-name { font-weight: 600; font-size: 15px; color: var(--text); }
  .recent-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .recent-arrow { color: var(--muted); font-size: 16px; }

  .empty-recents {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
  }
  .empty-recents .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-recents p { font-size: 14px; }

  /* API banner */
  .api-banner {
    background: #7c5a00;
    color: #fde68a;
    font-size: 12px;
    padding: 8px 16px;
    text-align: center;
    line-height: 1.4;
  }
  .api-banner a { color: #fbbf24; }

  /* ── RESULTS SCREEN ── */
  #results { background: var(--surface); }

  .results-header {
    background: var(--green);
    padding: 12px 20px 16px;
    flex-shrink: 0;
  }
  .results-header .back-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .results-header .back-row span { color: var(--gold); font-size: 14px; font-weight: 500; }
  .results-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 2px;
  }
  .results-header .sub { font-size: 13px; color: rgba(244,241,234,0.6); }

  .results-tabs {
    display: flex;
    gap: 0;
    background: var(--green-mid);
    padding: 6px;
    margin: 0 20px 16px;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .results-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: rgba(244,241,234,0.6);
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .results-tab.active {
    background: var(--gold);
    color: #fff;
  }

  /* Top cards horizontal scroll */
  .top-cards-row {
    display: flex;
    gap: 14px;
    padding: 0 20px 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .top-cards-row::-webkit-scrollbar { display: none; }

  .top-card {
    flex-shrink: 0;
    width: 200px;
    border-radius: 20px;
    overflow: hidden;
    scroll-snap-align: start;
    cursor: pointer;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transition: transform 0.15s;
  }
  .top-card:active { transform: scale(0.97); }
  .top-card-img {
    width: 200px;
    height: 140px;
    object-fit: cover;
    display: block;
  }
  .top-card-body { padding: 12px; background: #fff; }
  .top-card-rank {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .top-card-name { font-weight: 700; font-size: 14px; color: var(--text); line-height: 1.25; }
  .top-card-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(196,137,42,0.12);
    color: var(--gold);
    font-weight: 600;
  }
  .tag.green {
    background: rgba(45,74,45,0.1);
    color: var(--green);
  }

  /* List rows */
  .list-section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    padding: 4px 20px 12px;
  }

  .place-list { display: flex; flex-direction: column; gap: 0; }
  .place-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: background 0.15s;
  }
  .place-row:active { background: rgba(0,0,0,0.03); }
  .place-row-img {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .place-row-info { flex: 1; min-width: 0; }
  .place-row-name { font-weight: 600; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .place-row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .place-row-dist { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .place-row-arrow { color: var(--muted); flex-shrink: 0; }

  /* Hidden gems section */
  .hidden-section { padding: 20px 20px 0; }
  .hidden-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .hidden-badge {
    background: var(--green);
    color: var(--gold);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .hidden-cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .hidden-card {
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    aspect-ratio: 3/4;
    transition: transform 0.15s;
  }
  .hidden-card:active { transform: scale(0.97); }
  .hidden-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hidden-card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 28px 10px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }
  .hidden-card-name { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.25; }
  .hidden-card-tag { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: 2px; }

  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .photo-skeleton { background: linear-gradient(90deg, #d1d5db 25%, #e9ebee 50%, #d1d5db 75%) !important; background-size: 200% 100% !important; animation: shimmer 1.4s ease-in-out infinite !important; }
  @keyframes photo-fadein { from { opacity: 0; } to { opacity: 1; } }
  .photo-fadein { animation: photo-fadein 0.45s ease forwards; }

  /* ── DETAIL SCREEN ── */
  #detail { background: var(--surface); }

  .detail-hero {
    position: relative;
    height: 260px;
    flex-shrink: 0;
  }
  .detail-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .detail-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 30%, rgba(0,0,0,0.55) 100%);
  }
  .detail-hero-actions {
    position: absolute;
    top: 12px;
    left: 16px;
    right: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 18px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: rgba(0,0,0,0.65); }
  .icon-btn.saved { color: #f87171; }

  .detail-hero-info {
    position: absolute;
    bottom: 14px;
    left: 16px;
    right: 16px;
  }
  .detail-kind-badge {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .detail-name {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .detail-body { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 100px; }

  .detail-pills {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .detail-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(45,74,45,0.08);
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
  }

  .detail-desc {
    font-size: 14px;
    line-height: 1.65;
    color: #444;
    margin-bottom: 20px;
  }

  .info-rows { display: flex; flex-direction: column; gap: 0; }
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .info-row-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .info-row-content { flex: 1; }
  .info-row-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .info-row-value { font-size: 14px; font-weight: 500; color: var(--text); }

  /* Map */
  #detailMap {
    border-radius: 16px;
    overflow: hidden;
    margin-top: 20px;
    height: 180px;
    z-index: 0;
  }
  .leaflet-container { font-family: inherit; }
  .open-map-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
  }
  .open-map-btn:active { opacity: 0.85; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    min-height: 60px;
    height: 72px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    padding-top: 6px;
    z-index: 50;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .nav-btn:active { opacity: 0.6; }
  .nav-icon { font-size: 24px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--muted); }
  .nav-btn.active .nav-icon { filter: none; }
  .nav-btn.active .nav-label { color: var(--green); }
  .nav-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
    display: none;
  }
  .nav-btn.active .nav-dot { display: block; }

  /* ── MOBILE: fill full screen, fix nav ── */
  @media (max-width: 500px) {
    html, body { height: 100%; overflow: hidden; }
    .device-wrap { padding: 0; height: 100dvh; align-items: stretch; }
    .device {
      width: 100%; height: 100dvh;
      border-radius: 0; border: none; box-shadow: none;
    }
    .dynamic-island { display: none; }
    .bottom-nav {
      position: fixed !important;
      bottom: 0; left: 0; right: 0;
      z-index: 9999 !important;
      height: 60px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .home-body { padding-bottom: 80px; }
    .detail-body { padding-bottom: 80px; }
  }

  /* Toast */
  .toast {
    position: absolute;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,30,0.9);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
    backdrop-filter: blur(10px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Weather chip */
  .weather-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(196,137,42,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--cream);
    margin-top: 12px;
  }

  /* Topo background pattern */
  .topo-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    opacity: 0.06;
  }

  /* Loading spinner */
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(196,137,42,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="device-wrap">
  <div class="device">
    <div class="dynamic-island"></div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar" style="color:#fff; background: #2d4a2d;">
      <span class="time" id="statusTime">9:41</span>
      <span class="icons">▲▲▲ WiFi 100%</span>
    </div>

    <div class="app">
      <!-- ── HOME ── -->
      <div class="screen active" id="home">
        <div id="apiBanner" class="api-banner" style="display:none">
          Demo mode — <a href="https://opentripmap.io" target="_blank">get an API key</a> to search real destinations.
        </div>
        <div class="home-hero">
          <div class="topo-bg">
            <svg width="100%" height="100%" viewBox="0 0 393 220" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="196" cy="110" rx="180" ry="80" stroke="#c4892a" stroke-width="1.5" fill="none"/>
              <ellipse cx="196" cy="110" rx="140" ry="55" stroke="#c4892a" stroke-width="1.5" fill="none"/>
              <ellipse cx="196" cy="110" rx="100" ry="32" stroke="#c4892a" stroke-width="1.5" fill="none"/>
              <ellipse cx="196" cy="110" rx="60" ry="14" stroke="#c4892a" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
          <h1>Where will<br><em>adventure</em> take you?</h1>
          <p>Discover icons &amp; hidden gems for any city</p>
          <div class="search-bar">
            <span class="search-icon">🧭</span>
            <input type="text" id="searchInput" placeholder="City, country…" autocomplete="off" autocorrect="off">
            <button class="search-btn" onclick="triggerSearch()">Explore</button>
          </div>
          <div id="weatherChip" class="weather-chip" style="display:none">
            <span id="weatherIcon">🌤</span>
            <span id="weatherText">Loading weather…</span>
          </div>
        </div>

}

// ── API ──────────────────────────────────────────────────────────────────────
async function geocode(city) {
  const r = await fetch(`https://api.opentripmap.com/0.1/en/places/geoname?name=${encodeURIComponent(city)}&apikey=${CONFIG.OPENTRIPMAP_KEY}`);
  if (!r.ok) throw new Error('geocode failed');
  return r.json();
}

async function fetchPOIs(lat, lon, kinds, limit = 20, radius = 5000) {
  const url = `https://api.opentripmap.com/0.1/en/places/radius?radius=${radius}&lon=${lon}&lat=${lat}&kinds=${kinds}&limit=${limit}&format=json&apikey=${CONFIG.OPENTRIPMAP_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('POI fetch failed');
  return r.json();
}

async function fetchPOIDetail(xid) {
  for (let attempt = 0; attempt < 3; attempt++) {
    const r = await fetch(`https://api.opentripmap.com/0.1/en/places/xid/${xid}?apikey=${CONFIG.OPENTRIPMAP_KEY}`);
    if (r.status === 429) {
      await new Promise(res => setTimeout(res, 1000 * (attempt + 1)));
      continue;
    }
    if (!r.ok) return null;
    return r.json();
  }
  return null;
}

async function fetchPOIDetailsSequential(xids) {
  const results = [];
  for (const xid of xids) {
    results.push(await fetchPOIDetail(xid));
    await new Promise(res => setTimeout(res, 200));
  }
  return results;
}

// ── PHOTO CHAIN ──────────────────────────────────────────────────────────────
const TRANSPARENT_GIF = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

// Wikipedia semaphore — max 2 concurrent requests to avoid 429
const _wikiSem = { count: 0, max: 2, queue: [] };
function _wikiAcquire() {
  return new Promise(resolve => {
    if (_wikiSem.count < _wikiSem.max) { _wikiSem.count++; resolve(); }
    else _wikiSem.queue.push(resolve);
  });
}
function _wikiRelease() {
  if (_wikiSem.queue.length) _wikiSem.queue.shift()();
  else _wikiSem.count--;
}

// Generic descriptive words that never have their own Wikipedia article
const WIKI_GENERIC = new Set(['grave','wayside','cross','shrine','chapel','stone',
  'memorial','allegory','stolperstein','monument','statue','well','fountain',
  'plaque','tombstone','pillar','column','sign','marker','inscription']);

function _isWikiSearchable(name) {
  if (!name || name.length <= 6) return false;
  const words = name.toLowerCase().split(/\s+/);
  return !words.some(w => WIKI_GENERIC.has(w));
}

async function _wikiSummaryPhoto(name) {
  try {
    const slug = encodeURIComponent(name.trim().replace(/\s+/g, '_'));
    for (const lang of ['en', 'cs']) {
      const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${slug}`, { headers: { Accept: 'application/json' } });
      if (!r.ok) continue;
      const d = await r.json();
      const img = d.thumbnail?.source || d.originalimage?.source;
      if (img) return img;
    }
    return null;
  } catch { return null; }
}

async function _wikimediaSearchPhoto(name) {
  try {
    for (const lang of ['en', 'cs']) {
      const url = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=400&origin=*`;
      const r = await fetch(url);
      if (!r.ok) continue;
      const d = await r.json();
      const page = Object.values(d?.query?.pages || {})[0];
      if (page?.thumbnail?.source) return page.thumbnail.source;
    }
    return null;
  } catch { return null; }
}

const _unsplashCache = new Map();
function _unsplashPhoto(query) {
  const key = query.toLowerCase();
  if (_unsplashCache.has(key)) return _unsplashCache.get(key);
  // Store the promise immediately so concurrent calls share one in-flight request
  const promise = (async () => {
    try {
      for (let attempt = 0; attempt < 3; attempt++) {
        const r = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=1&orientation=landscape`, { headers: { Authorization: `Client-ID ${CONFIG.UNSPLASH_KEY}` } });
        if (r.status === 429) { await new Promise(res => setTimeout(res, 1000 * (attempt + 1))); continue; }
        if (!r.ok) return null;
        const d = await r.json();
        return d.results?.[0]?.urls?.regular || null;
      }
      return null;
    } catch { return null; }
  })();
  _unsplashCache.set(key, promise);
  return promise;
}

const WIKI_WORTHY = ['castle', 'palace', 'fortif', 'museum', 'religious', 'church', 'mosque', 'synagog', 'sacred', 'natural', 'historic'];

// Main photo resolver — detail is the already-fetched OTM detail object
async function getPlacePhoto(name, city, kinds, detail) {
  const tag = `[Photo "${name}"]`;
  let url;

  // T1: OTM preview.source
  const otm = detail?.preview?.source;
  if (otm) { console.log(`${tag} ✅ T1 OTM`); return otm; }

  // T2: Wikipedia — only wiki-worthy categories AND proper-noun names
  const k = (kinds || '').toLowerCase();
  if (WIKI_WORTHY.some(w => k.includes(w)) && _isWikiSearchable(name)) {
    await _wikiAcquire();
    try {
      url = await _wikiSummaryPhoto(name);
      if (url) { console.log(`${tag} ✅ T2 Wikipedia summary`); return url; }
      url = await _wikimediaSearchPhoto(name);
      if (url) { console.log(`${tag} ✅ T2 Wikimedia search`); return url; }
    } finally {
      _wikiRelease();
    }
  }

  // T3: Unsplash — simplified name + city (skip if simplified is empty / too short)
  const simplified = simplifyName(name);
  if (simplified && simplified.trim().length >= 3) {
    const q3 = `${simplified} ${city}`;
    url = await _unsplashPhoto(q3);
    if (url) { console.log(`${tag} ✅ T3 Unsplash "${q3}"`); return url; }
  }

  // T4: Unsplash — city + category keyword
  const catWord = kindSearchWord(kinds);
  const q4 = `${city} ${catWord}`;
  url = await _unsplashPhoto(q4);
  if (url) { console.log(`${tag} ✅ T4 Unsplash "${q4}"`); return url; }

  // T5: Unsplash — city travel
  const q5 = `${city} travel`;
  url = await _unsplashPhoto(q5);
  if (url) { console.log(`${tag} ✅ T5 Unsplash "${q5}"`); return url; }

  // T5b: Unsplash — city alone (final safety net for top cards)
  url = await _unsplashPhoto(city);
  if (url) { console.log(`${tag} ✅ T5b Unsplash "${city}"`); return url; }

  // T6: gradient fallback
  console.log(`${tag} 🎨 T6 gradient`);
  return null;
}

// Apply a resolved photo URL to all DOM img elements with matching data-photo-xid
function applyPhotoToDOM(xid, url, hue, kinds) {
  const grad = kindGradient(kinds);
  document.querySelectorAll(`[data-photo-xid="${xid}"]`).forEach(img => {
    if (url) {
      img.addEventListener('load', () => {
        if (img.src.startsWith('data:')) return;
        img.style.background = '';
        img.classList.remove('photo-skeleton');
        img.classList.add('photo-fadein');
      }, { once: true });
      img.onerror = () => {
        img.src = TRANSPARENT_GIF;
        img.style.background = grad;
        img.classList.remove('photo-skeleton');
      };
      img.src = url;
    } else {
      img.src = TRANSPARENT_GIF;
      img.style.background = grad;
      img.classList.remove('photo-skeleton');
    }
  });
}

async function doSearch(query) {
  state.query = query;
  navigateTo('results');
  document.getElementById('resultsContent').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Discovering ${esc(query)}…</div>
    </div>`;
  document.getElementById('resultsCity').textContent = query;
  document.getElementById('resultsSub').textContent = 'Loading…';

  try {
    if (DEMO_MODE) throw new Error('demo');

    const geo = await geocode(query);
    state.destination = geo.name || query;
    state.country = geo.country || '';
    state.coords = { lat: geo.lat, lon: geo.lon };

    const [topRaw, hiddenRaw] = await Promise.all([
      fetchPOIs(geo.lat, geo.lon, 'cultural,historic,architecture,museums,religion,natural', 20),
      fetchPOIs(geo.lat, geo.lon, 'natural,sport,amusements,shops,foods,adult', 15),
    ]);

    const dedupe = (arr) => {
      const seenXid = new Set(), seenName = new Set();
      return arr.filter(p => {
        if (seenXid.has(p.xid) || seenName.has(p.name?.toLowerCase())) return false;
        seenXid.add(p.xid); seenName.add(p.name?.toLowerCase()); return true;
      });
    };

    const topDeduped = dedupe(topRaw).slice(0, 10);
    const hiddenDeduped = dedupe(hiddenRaw).slice(0, 10);

    // Fetch OTM details sequentially to avoid 429 rate limits (200ms gap, 3-retry on 429)
    const allDetails = await fetchPOIDetailsSequential(
      [...topDeduped, ...hiddenDeduped].map(p => p.xid)
    );
    const topDetails = allDetails.slice(0, topDeduped.length);
    const hiddenDetails = allDetails.slice(topDeduped.length);

    state.topPlaces = topDeduped.map((p, i) => ({ ...p, ...(topDetails[i] || {}), img: null, hue: HUES[i % HUES.length] }));
    state.hiddenPlaces = hiddenDeduped.map((p, i) => ({ ...p, ...(hiddenDetails[i] || {}), img: null, hue: HUES[(i + 5) % HUES.length] }));

  } catch {
    state.destination = query;
    state.country = 'Demo';
    state.coords = { lat: 38.717, lon: -9.139 };
    state.topPlaces = DEMO_TOP;
    state.hiddenPlaces = DEMO_HIDDEN;
    if (!DEMO_MODE) showToast('API error — showing Lisbon demo');
  }

  // Save to recents
  if (!state.recents.find(r => r.name === state.destination)) {
    state.recents.unshift({ name: state.destination, country: state.country, hue: HUES[0] });
    if (state.recents.length > 5) state.recents.pop();
    localStorage.setItem('wl_recents', JSON.stringify(state.recents));
    renderRecents();
  }

  document.getElementById('resultsCity').textContent = state.destination;
  document.getElementById('resultsSub').textContent = `${state.country} · Top sights & hidden gems`;

  state.tab = 'top';
  document.getElementById('tabTop').classList.add('active');
  document.getElementById('tabHidden').classList.remove('active');
  renderResultsTab();

  // Preload all photos in parallel — update DOM as each resolves
  [...state.topPlaces, ...state.hiddenPlaces].forEach(p => {
    getPlacePhoto(p.name, state.destination, p.kinds, p).then(url => {
      p.img = url;
      applyPhotoToDOM(p.xid, url, p.hue, p.kinds);
    });
  });

  // Weather (no API key needed)
  fetchWeather(state.coords.lat, state.coords.lon).then(w => {
    if (!w?.current_weather) return;
    const [icon, desc] = weatherDesc(w.current_weather.weathercode);
    const temp = Math.round(w.current_weather.temperature);
    document.getElementById('weatherChip').style.display = 'inline-flex';
    document.getElementById('weatherIcon').textContent = icon;
    document.getElementById('weatherText').textContent = `${temp}°C · ${desc} in ${state.destination}`;
  }).catch(() => {});
}

// ── RENDER RESULTS ───────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tabTop').classList.toggle('active', tab === 'top');
  document.getElementById('tabHidden').classList.toggle('active', tab === 'hidden');
  document.getElementById('resultsScroll').scrollTop = 0;
  renderResultsTab();
}

function renderResultsTab() {
  const el = document.getElementById('resultsContent');
  if (state.tab === 'top') {
    el.innerHTML = renderTopSection();
  } else {
    el.innerHTML = renderHiddenSection();
  }
}

function renderTopSection() {
  const places = state.topPlaces;
  if (!places.length) return '<div class="loading-state"><div>No places found.</div></div>';

  const cards = places.slice(0, 5).map((p, i) => topCardHTML(p, i)).join('');
  const rows = places.slice(5).map((p, i) => listRowHTML(p, i + 5)).join('');

  return `
    <div class="top-cards-row">${cards}</div>
    ${rows ? `<div class="list-section-title" style="padding-top:4px">More to explore</div><div class="place-list">${rows}</div>` : ''}
  `;
}

function topCardHTML(p, i) {
  const tag = topTag(p);
  const grad = kindGradient(p.kinds);
  const style = p.img ? '' : ` style="background:${grad}"`;
  const onerr = p.img ? ` onerror="this.src='${TRANSPARENT_GIF}';this.style.background='${grad}'"` : '';
  return `
    <div class="top-card" data-xid="${esc(p.xid)}" data-kind="top">
      <img class="${p.img ? 'top-card-img' : 'top-card-img photo-skeleton'}" data-photo-xid="${esc(p.xid)}" data-pw="200" data-ph="140"
        src="${p.img ? esc(p.img) : TRANSPARENT_GIF}" alt="${esc(p.name)}"${style}${onerr}>
      <div class="top-card-body">
        <div class="top-card-rank">#${i+1} of 10</div>
        <div class="top-card-name">${esc(truncName(p.name))}</div>
        <div class="top-card-tags">
          <span class="tag">${esc(tag)}</span>
          ${p.dist && p.dist >= 10 && p.dist < 100000 ? `<span class="tag green">${esc(formatDist(p.dist))}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function listRowHTML(p, i, kind = 'top') {
  const tag = kind === 'hidden' ? hiddenTag(p).replace(/^.\s/,'') : topTag(p);
  const grad = kindGradient(p.kinds);
  const style = p.img ? '' : ` style="background:${grad}"`;
  const onerr = p.img ? ` onerror="this.src='${TRANSPARENT_GIF}';this.style.background='${grad}'"` : '';
  return `
    <div class="place-row" data-xid="${esc(p.xid)}" data-kind="${kind}">
      <img class="${p.img ? 'place-row-img' : 'place-row-img photo-skeleton'}" data-photo-xid="${esc(p.xid)}" data-pw="56" data-ph="56"
        src="${p.img ? esc(p.img) : TRANSPARENT_GIF}" alt="${esc(p.name)}"${style}${onerr}>
      <div class="place-row-info">
        <div class="place-row-name">${esc(truncName(p.name))}</div>
        <div class="place-row-sub">${esc(tag)}</div>
        ${p.dist && p.dist >= 10 && p.dist < 100000 ? `<div class="place-row-dist">${esc(formatDist(p.dist))}</div>` : ''}
      </div>
      <span class="place-row-arrow">›</span>
    </div>`;
}

function renderHiddenSection() {
  const places = state.hiddenPlaces;
  if (!places.length) return '<div class="loading-state"><div>No hidden gems found.</div></div>';

  const rows = places.slice(0, 5).map(p => listRowHTML(p, 0, 'hidden')).join('');
  const grid = places.slice(5, 10).map(p => hiddenCardHTML(p)).join('');

  return `
    <div class="hidden-section">
      <div class="hidden-header">
        <span class="hidden-badge">💎 Hidden Gems</span>
        <div class="list-section-title" style="margin:0;padding:0;font-size:16px">Off the beaten path</div>
      </div>
      <div class="place-list">${rows}</div>
      ${grid ? `<div class="hidden-cards-grid" style="margin-top:16px;padding-bottom:20px">${grid}</div>` : ''}
    </div>`;
}

function hiddenCardHTML(p) {
  const tag = hiddenTag(p);
  const grad = kindGradient(p.kinds);
  const style = p.img ? '' : ` style="background:${grad}"`;
  const onerr = p.img ? ` onerror="this.src='${TRANSPARENT_GIF}';this.style.background='${grad}'"` : '';
  return `
    <div class="hidden-card" data-xid="${esc(p.xid)}" data-kind="hidden">
      <img class="${p.img ? '' : 'photo-skeleton'}" data-photo-xid="${esc(p.xid)}" data-pw="160" data-ph="213"
        src="${p.img ? esc(p.img) : TRANSPARENT_GIF}" alt="${esc(p.name)}"${style}${onerr}>
      <div class="hidden-card-overlay">
        <div class="hidden-card-name">${esc(truncName(p.name))}</div>
        <div class="hidden-card-tag">${esc(tag)}</div>
      </div>
    </div>`;
}

// ── EVENT DELEGATION FOR RESULT CARDS ────────────────────────────────────────
document.getElementById('resultsContent').addEventListener('click', e => {
  const el = e.target.closest('[data-xid]');
  if (!el) return;
  openDetail(el.dataset.xid, el.dataset.kind);
});

// ── HELPERS: DESCRIPTION ─────────────────────────────────────────────────────
function getDescription(p) {
  const raw = p.wikipedia_extracts?.text || p.info?.descr || '';
  if (raw.trim()) {
    const sentences = raw.match(/[^.!?]+[.!?]+/g) || [];
    const two = sentences.slice(0, 2).join(' ').trim();
    return two || raw.slice(0, 240) + '…';
  }
  const kind = formatKind(p.kinds).toLowerCase();
  return `${p.name || 'This place'} is a remarkable ${kind} and one of the standout attractions in ${state.destination}. It offers visitors a genuine taste of local culture and history that should not be missed.`;
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
let leafletMap = null;
let leafletMarker = null;

function openDetail(xid, kind) {
  const list = kind === 'top' ? state.topPlaces : state.hiddenPlaces;
  const place = list.find(p => String(p.xid) === String(xid));
  if (!place) {
    // fallback: search both lists
    const fallback = [...state.topPlaces, ...state.hiddenPlaces].find(p => String(p.xid) === String(xid));
    if (!fallback) return;
    kind = state.topPlaces.includes(fallback) ? 'top' : 'hidden';
    state.activePlace = fallback;
    state.activeKind = kind;
    renderDetail(fallback, kind);
  } else {
    state.activePlace = place;
    state.activeKind = kind;
    renderDetail(place, kind);
  }
  navigateTo('detail');
}

function renderDetail(p, kind) {
  kind = kind || state.activeKind;
  const _icon = kindIcon(p.kinds);
  const heroImg = document.getElementById('detailHeroImg');
  heroImg.dataset.photoXid = p.xid;
  heroImg.dataset.pw = '393';
  heroImg.dataset.ph = '260';
  if (p.img) {
    heroImg.classList.remove('photo-skeleton');
    heroImg.style.background = '';
    heroImg.src = p.img;
    heroImg.onerror = () => { heroImg.src = TRANSPARENT_GIF; heroImg.style.background = kindGradient(p.kinds); };
  } else {
    heroImg.classList.add('photo-skeleton');
    heroImg.src = TRANSPARENT_GIF;
    heroImg.setAttribute('data-photo-xid', p.xid);
  }
  document.getElementById('detailName').textContent = p.name || '';
  document.getElementById('detailBadge').textContent = kind === 'hidden' ? hiddenTag(p).replace(/^.\s/,'') : topTag(p);

  // Save button
  const saved = state.saved.has(String(p.xid));
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = saved ? '♥' : '♡';
  saveBtn.classList.toggle('saved', saved);

  // Pills — hide distance if missing or implausible (> 500 km)
  const pills = [];
  if (p.dist && p.dist >= 10 && p.dist < 100000) pills.push(`🚶 ${estimateTime(p.dist)}`);
  if (p.dist && p.dist >= 10 && p.dist < 100000) pills.push(`📏 ${formatDist(p.dist)}`);
  if (p.point?.lat) pills.push(`📍 ${p.point.lat.toFixed(3)}, ${p.point.lon.toFixed(3)}`);
  document.getElementById('detailPills').innerHTML = pills.map(t => `<div class="detail-pill">${esc(t)}</div>`).join('');

  // Description — 2 sentences from Wikipedia extract, or generic fallback
  document.getElementById('detailDesc').textContent = getDescription(p);

  // Info rows
  const rows = [];
  if (p.address?.road || p.address?.city || p.address?.town) {
    rows.push(['📍', 'Location', esc([p.address?.road, p.address?.city || p.address?.town].filter(Boolean).join(', '))]);
  }
  if (p.url) rows.push(['🔗', 'Website', `<a href="${esc(p.url)}" target="_blank" style="color:var(--green)">${esc(p.url.replace(/^https?:\/\//,''))}</a>`]);
  if (p.wikipedia) rows.push(['📖', 'Wikipedia', `<a href="${esc(p.wikipedia)}" target="_blank" style="color:var(--green)">Read article →</a>`]);
  const admissionText = p.admission ? p.admission : (p.url ? 'Check official website for pricing' : 'Free entry');
  rows.push(['🎫', 'Admission', esc(admissionText)]);
  rows.push(['🕐', 'Best time', kind === 'hidden' ? 'Early morning or late afternoon' : 'Morning for fewer crowds']);
  rows.push(['⭐', 'Category', esc(formatKind(p.kinds))]);

  document.getElementById('detailInfoRows').innerHTML = rows.map(([icon, label, val]) => `
    <div class="info-row">
      <div class="info-row-icon">${icon}</div>
      <div class="info-row-content">
        <div class="info-row-label">${esc(label)}</div>
        <div class="info-row-value">${val}</div>
      </div>
    </div>`).join('');

  // Store coords for map (use place point, fall back to city coords)
  const lat = p.point?.lat || state.coords.lat;
  const lon = p.point?.lon || state.coords.lon;
  state._detailLat = lat;
  state._detailLon = lon;
  state._detailName = p.name;
}

function initLeafletMap(lat, lon, name) {
  const container = document.getElementById('detailMap');
  if (!container) return;

  if (!leafletMap) {
    leafletMap = L.map('detailMap', {
      zoomControl: true,
      attributionControl: true,
      scrollWheelZoom: false,
    }).setView([lat, lon], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OSM</a>',
      maxZoom: 19,
    }).addTo(leafletMap);
  } else {
    leafletMap.setView([lat, lon], 15);
    if (leafletMarker) leafletMap.removeLayer(leafletMarker);
  }

  const goldIcon = L.divIcon({
    html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">📍</div>',
    className: '',
    iconAnchor: [14, 28],
  });

  leafletMarker = L.marker([lat, lon], { icon: goldIcon })
    .addTo(leafletMap)
    .bindPopup(`<b>${name}</b>`)
    .openPopup();

  setTimeout(() => leafletMap.invalidateSize(), 120);
}

function toggleSave() {
  const p = state.activePlace;
  if (!p) return;
  const xid = String(p.xid);
  if (state.saved.has(xid)) {
    state.saved.delete(xid);
    document.getElementById('saveBtn').textContent = '♡';
    document.getElementById('saveBtn').classList.remove('saved');
    showToast('Removed from saved');
  } else {
    state.saved.add(xid);
    document.getElementById('saveBtn').textContent = '♥';
    document.getElementById('saveBtn').classList.add('saved');
    showToast('Saved!');
  }
  localStorage.setItem('wl_saved', JSON.stringify([...state.saved]));
}

function openMap() {
  const lat = state._detailLat || state.coords.lat;
  const lon = state._detailLon || state.coords.lon;
  window.open(`https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=16&layers=M`, '_blank');
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function navigateTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  state.screen = screenId;

  const sb = document.getElementById('statusBar');
  sb.style.background = screenId === 'detail' ? 'transparent' : '#2d4a2d';
  sb.style.color = '#fff';

  if (screenId === 'detail' && state._detailLat) {
    // Init map after screen is visible so Leaflet can measure the container
    setTimeout(() => initLeafletMap(state._detailLat, state._detailLon, state._detailName), 50);
  }
}

// ── RECENTS ──────────────────────────────────────────────────────────────────
function renderRecents() {
  const el = document.getElementById('recentsList');
  if (!state.recents.length) {
    el.innerHTML = `<div class="empty-recents"><div class="icon">🌍</div><p>Search a city to start your journey</p></div>`;
    return;
  }
  el.innerHTML = state.recents.map(r => `
    <div class="recent-item" onclick="doSearch('${esc(r.name)}')">
      <div class="recent-thumb">
        <img src="${TRANSPARENT_GIF}" style="background:linear-gradient(135deg,hsl(${r.hue||35},40%,30%),hsl(${(r.hue||35)+20},50%,20%));display:block;width:100%;height:100%;border-radius:inherit" alt="">
      </div>
      <div class="recent-info">
        <div class="recent-name">${esc(r.name)}</div>
        <div class="recent-sub">${esc(r.country || '')}</div>
      </div>
      <span class="recent-arrow">›</span>
    </div>`).join('');
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SEARCH INPUT ─────────────────────────────────────────────────────────────
function triggerSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) doSearch(q);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerSearch();
});

// ── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('statusTime').textContent =
    `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 30000);

// ── INIT ─────────────────────────────────────────────────────────────────────
if (DEMO_MODE) {
  document.getElementById('apiBanner').style.display = 'block';
}
renderRecents();

// Service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
